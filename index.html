<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIG NEXUS SOLUTION LTD - Dashboard</title>
    
    <!-- STABLE STYLING COMPILER FOR LIVE SERVERS (ONRENDER) -->
    <script src="https://tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }
        .app-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen bg-slate-950 p-0 sm:p-3 selection:bg-blue-500 selection:text-white">

    <!-- Primary Phone Screen Layout Base Container -->
    <div class="w-full max-w-sm bg-slate-50 min-h-screen sm:min-h-0 sm:h-[820px] sm:rounded-[45px] shadow-2xl sm:border-[12px] border-slate-800 overflow-hidden relative flex flex-col">
        
        <!-- Screen Content Viewport -->
        <div id="viewportContainer" class="app-scrollbar flex-1 overflow-y-auto px-5 py-6 flex flex-col justify-between pb-10 bg-slate-50 text-slate-800">
            
            <!-- SECTION 1: VISITOR REGISTRATION AND SIGN IN GATE -->
            <div id="authGateModule" class="flex flex-col justify-center my-auto w-full">
                <div class="text-center mb-6">
                    <div class="flex items-center justify-center gap-2 mb-1">
                        <i class="fa-solid fa-cubes text-blue-600 text-2xl"></i>
                        <h1 class="text-lg font-black text-slate-900 tracking-tight">GIG NEXUS SOLUTION LTD</h1>
                    </div>
                    <p class="text-xs text-slate-500 font-semibold">Account Onboarding Portal</p>
                </div>

                <!-- Credential Warning Banner -->
                <div id="authAlertBanner" class="hidden bg-red-50 border border-red-200 text-red-700 p-3 rounded-xl text-xs font-bold mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-triangle-exclamation text-sm"></i>
                    <span>Unknown username or wrong password</span>
                </div>

                <!-- Input Tab Container Card -->
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm w-full">
                    <div class="flex border-b border-slate-200 mb-4 text-xs font-bold uppercase tracking-wider">
                        <button id="tabSelectorLogin" type="button" class="w-1/2 pb-2 text-blue-600 border-b-2 border-blue-600" onclick="switchFormContext('login')">Sign In</button>
                        <button id="tabSelectorRegister" type="button" class="w-1/2 pb-2 text-slate-400" onclick="switchFormContext('register')">Register</button>
                    </div>

                    <!-- Client Access Form -->
                    <form id="signInForm" onsubmit="processUserSignIn(event)" class="space-y-3.5">
                        <div>
                            <label class="block text-[10px] font-extrabold text-slate-500 uppercase tracking-wide">Email Address</label>
                            <input type="email" id="loginEmailField" required class="w-full text-sm px-3 py-2 mt-1 border border-slate-200 rounded-lg bg-slate-50 focus:outline-blue-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-[10px] font-extrabold text-slate-500 uppercase tracking-wide">Secure Password</label>
                            <input type="password" id="loginPasswordField" required class="w-full text-sm px-3 py-2 mt-1 border border-slate-200 rounded-lg bg-slate-50 focus:outline-blue-500 transition-all">
                        </div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg text-xs uppercase tracking-wider transition-colors mt-2">Sign In</button>
                    </form>

                    <!-- Profile Registration Form -->
                    <form id="signUpForm" onsubmit="processUserSignUp(event)" class="space-y-3 hidden">
                        <div>
                            <label class="block text-[10px] font-extrabold text-slate-500 uppercase tracking-wide">Full Name</label>
                            <input type="text" required class="w-full text-sm px-3 py-2 border border-slate-200 rounded-lg bg-slate-50 focus:outline-blue-500">
                        </div>
                        <div>
                            <label class="block text-[10px] font-extrabold text-slate-500 uppercase tracking-wide">Phone Number</label>
                            <input type="tel" placeholder="e.g. 07..." required class="w-full text-sm px-3 py-2 border border-slate-200 rounded-lg bg-slate-50 focus:outline-blue-500">
                        </div>
                        <div>
                            <label class="block text-[10px] font-extrabold text-slate-500 uppercase tracking-wide">Email Address</label>
                            <input type="email" id="registerEmailField" required class="w-full text-sm px-3 py-2 border border-slate-200 rounded-lg bg-slate-50 focus:outline-blue-500">
                        </div>
                        <div>
                            <label class="block text-[10px] font-extrabold text-slate-500 uppercase tracking-wide">Country</label>
                            <select class="w-full text-sm px-3 py-2 border border-slate-200 rounded-lg bg-white focus:outline-blue-500">
                                <optgroup label="Africa">
                                    <option>Kenya</option>
                                    <option>South Africa</option>
                                    <option>Nigeria</option>
                                </optgroup>
                                <optgroup label="Europe">
                                    <option>United Kingdom</option>
                                    <option>Germany</option>
                                    <option>France</option>
                                    <option>Italy</option>
                                </optgroup>
                                <optgroup label="Asia">
                                    <option>Japan</option>
                                    <option>India</option>
                                    <option>South Korea</option>
                                </optgroup>
                                <optgroup label="Americas">
                                    <option>United States</option>
                                    <option>Canada</option>
                                </optgroup>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-extrabold text-slate-500 uppercase tracking-wide">Create Password</label>
                            <input type="password" id="registerPasswordField" required class="w-full text-sm px-3 py-2 border border-slate-200 rounded-lg bg-slate-50 focus:outline-blue-500">
                        </div>
                        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg text-xs uppercase tracking-wider transition-colors mt-2">Create Account</button>
                    </form>
                </div>
            </div>

            <!-- SECTION 2: LIVE METRICS USER DASHBOARD -->
            <div id="applicationDashboard" class="hidden flex flex-col space-y-4 w-full">
                
                <!-- Interface Header Component -->
                <div class="flex items-center justify-between border-b border-slate-200 pb-3">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-cubes text-blue-600 text-xl"></i>
                        <div>
                            <h1 class="text-sm font-black text-slate-900 tracking-tight leading-none">GIG NEXUS</h1>
                            <span class="text-[9px] text-slate-400 font-bold tracking-widest uppercase">Solution Ltd</span>
                        </div>
                    </div>
                    <button onclick="logoutActiveSession()" class="text-[11px] font-bold text-slate-400 hover:text-red-500 transition-colors">
                        Sign Out <i class="fa-solid fa-right-from-bracket ml-0.5"></i>
                    </button>
                </div>

                <!-- HIGH VISIBILITY ACTIVATION STATUS CARD -->
                <div class="bg-blue-50 border-2 border-blue-200 p-4 rounded-xl flex flex-col gap-3 shadow-md">
                    <div class="flex items-center justify-between">
                        <p class="text-xs font-bold text-slate-800 max-w-[65%] leading-tight">
                            Pay <span class="text-blue-700 font-extrabold text-sm">70 KSH</span> to activate your earnings layout account.
                        </p>
                        <button onclick="displayUiModal('depositAlertModal')" class="bg-blue-600 hover:bg-blue-700 text-white font-black text-[11px] py-2 px-3 rounded-lg shadow-md transition-colors tracking-wide uppercase">
                            Pay Now
                        </button>
                    </div>
                    <div class="bg-white border border-blue-100 p-2 rounded-lg text-[11px] text-slate-700 space-y-1 font-medium">
                        <div>💵 Send 70 KSH to M-Pesa: <span class="font-black text-blue-700 bg-blue-50 px-1 rounded text-xs">0142144664</span></div>
                        <div>🏢 Account Name: <span class="font-bold text-slate-950 text-[10px]">GIG NEXUS SOLUTION ANGENCIES LTD</span></div>
                    </div>
                </div>
